<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Git & Github</title>
    <style>
        :root {
            color-scheme: dark;
            --ink: #f7f2e8;
            --muted: #b9c0c7;
            --glass: rgba(12, 18, 28, 0.72);
            --line: rgba(255, 255, 255, 0.18);
            --teal: #3ee7c9;
            --rose: #ff6f91;
            --gold: #ffd166;
            --navy: #08111f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            overflow: hidden;
            background:
                radial-gradient(circle at 18% 22%, rgba(62, 231, 201, 0.28), transparent 28rem),
                radial-gradient(circle at 78% 18%, rgba(255, 111, 145, 0.26), transparent 24rem),
                linear-gradient(135deg, #08111f 0%, #141726 45%, #261827 100%);
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 44px 44px;
            mask-image: linear-gradient(to bottom, transparent, black 18%, black 78%, transparent);
        }

        main {
            width: min(92vw, 900px);
            padding: clamp(2rem, 8vw, 5rem);
            position: relative;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--glass);
            box-shadow: 0 32px 90px rgba(0, 0, 0, 0.42);
            backdrop-filter: blur(24px);
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .spark {
            width: 72px;
            height: 72px;
            margin: 0 auto 1.5rem;
            display: grid;
            place-items: center;
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 50%;
            background:
                conic-gradient(from 220deg, var(--teal), var(--gold), var(--rose), var(--teal));
            box-shadow: 0 0 34px rgba(62, 231, 201, 0.36);
            animation: float 4s ease-in-out infinite;
        }

        .spark::after {
            content: "";
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--navy);
            box-shadow: inset 0 0 0 8px rgba(255, 255, 255, 0.92);
        }

        h1 {
            margin: 0;
            font-size: clamp(3rem, 11vw, 7.8rem);
            line-height: 0.92;
            font-weight: 900;
            letter-spacing: 0;
        }

        h1 span {
            display: block;
            color: transparent;
            background: linear-gradient(90deg, var(--teal), var(--gold), var(--rose));
            background-clip: text;
            -webkit-background-clip: text;
        }

        p {
            max-width: 36rem;
            margin: 1.35rem auto 0;
            color: var(--muted);
            font-size: clamp(1rem, 2.4vw, 1.25rem);
            line-height: 1.7;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.9rem;
            margin-top: 2.2rem;
        }

        a {
            min-height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.85rem 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 8px;
            color: var(--ink);
            text-decoration: none;
            font-weight: 800;
            transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
        }

        .actions a:first-child,
        nav a[aria-current="page"] {
            background: var(--ink);
            color: #101522;
        }

        a:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.48);
            background: rgba(255, 255, 255, 0.11);
        }

        .actions a:first-child:hover,
        nav a[aria-current="page"]:hover {
            background: #ffffff;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @media (max-width: 560px) {
            body {
                overflow: auto;
            }

            main {
                margin: 1rem;
            }

            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <main>
        <nav aria-label="Site navigation">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="contact.html" aria-current="page">Contact</a>
        </nav>
        <div class="spark" aria-hidden="true"></div>
        <h1>Contact <span>Us</span></h1>
        <p>Have a question, idea, or note to share? Send a message and keep the project moving forward.</p>
        <div class="actions" aria-label="Page actions">
            <a href="mailto:hello@example.com">Email Us</a>
            <a href="about.html">Learn More</a>
        </div>
    </main>
</body>

</html>
